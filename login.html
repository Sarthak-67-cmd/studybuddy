<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>StudyBuddy Login</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Poppins,sans-serif;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#f2f2f2;
}

.card{
    width:420px;
    background:white;
    padding:40px;
    border-radius:25px;
    box-shadow:0 10px 30px rgba(0,0,0,.15);
    text-align:center;
}

.logo{
    width:80px;
    height:80px;
    margin:auto;
    background:#ff5b5b;
    border-radius:50%;
    color:white;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:40px;
}

h1{
    margin-top:20px;
}

p{
    color:gray;
    margin-bottom:25px;
}

.social{
    display:flex;
    gap:10px;
    margin-bottom:20px;
}

.social button{
    flex:1;
    padding:15px;
    border:1px solid #ddd;
    border-radius:12px;
    background:white;
    cursor:pointer;
    font-size:25px;
}

.line{
    margin:20px 0;
    color:gray;
}

input{
    width:100%;
    padding:15px;
    border-radius:12px;
    border:1px solid #ddd;
    margin-bottom:15px;
    font-size:16px;
}

.login-btn{
    width:100%;
    padding:15px;
    background:#ff5b5b;
    color:white;
    border:none;
    border-radius:12px;
    font-size:18px;
    cursor:pointer;
}

.login-btn:hover{
    opacity:.9;
}

</style>

</head>

<body>

<div class="card">

<div class="logo">
📚
</div>

<h1>Welcome back</h1>

<p>Please enter your details to sign in.</p>

<div class="social">

<button onclick="googleLogin()">
🌐


<div class="line">
OR
</div>

<input
id="email"
type="email"
placeholder="E-Mail Address">

<input
id="password"
type="password"
placeholder="Password">

<button
class="login-btn"
onclick="googleLogin()">
Continue with Google
</button>

</div>

<script type="module" src="auth.js"></script>

</body>
</html>
