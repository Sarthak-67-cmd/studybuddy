<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>StudyBuddy Login</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Poppins,sans-serif;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#ff9a9e,#fad0c4,#a18cd1,#89f7fe);
}

.container{
    width:420px;
    background:rgba(255,255,255,.9);
    padding:40px;
    border-radius:25px;
    box-shadow:0 10px 30px rgba(0,0,0,.2);
}

.logo{
    width:90px;
    height:90px;
    margin:auto;
    border-radius:50%;
    background:#ff4d4d;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:40px;
    color:white;
}

h1{
    text-align:center;
    margin-top:20px;
}

p{
    text-align:center;
    color:gray;
    margin:15px 0 30px;
}

.google-btn{
    width:100%;
    padding:15px;
    border:none;
    border-radius:12px;
    background:#4285F4;
    color:white;
    font-size:18px;
    cursor:pointer;
}

.google-btn:hover{
    opacity:.9;
}

.divider{
    text-align:center;
    margin:25px 0;
    color:gray;
}

input{
    width:100%;
    padding:15px;
    margin-bottom:15px;
    border:none;
    border-radius:12px;
    background:#f2f2f2;
    font-size:16px;
}

.login-btn{
    width:100%;
    padding:15px;
    border:none;
    border-radius:12px;
    background:#ff4d4d;
    color:white;
    font-size:18px;
    cursor:pointer;
}

.login-btn:hover{
    opacity:.9;
}

</style>

</head>

<body>

<div class="container">

<div class="logo">
📚
</div>

<h1>Welcome Back</h1>

<p>Please enter your details to sign in.</p>

<button class="google-btn" onclick="googleLogin()">
Continue with Google
</button>

<div class="divider">
OR
</div>

<input
id="email"
type="email"
placeholder="E-Mail Address">

<input
id="password"
type="password"
placeholder="Password">

<button
class="login-btn"
onclick="login()">
Sign In
</button>

</div>

<script type="module" src="auth.js"></script>

</body>
</html>
